theme = "catppuccin-mocha"
diff_view = "unified"
ignore_whitespace = false
show_file_list = true
mouse = true
comment_vim = true # want my comment editing to be in vim mode
comment_tab_width = 4
wrap = false
cursor_line = true
transparent_background = true
scroll_offset = 5
no_update_check = false
review_watch_interval_ms = 1000
backend = "libgit2"
comment_types = [
  {id = "💡", label = "suggestion", definition = "possible improvements", color = "blue"},
  {id = "🔧", label = "nitpick", definition = "small optional tweaks", color = "#d19a66"},
  {id = "❓", label = "question", definition = "ask for clarification", color = "yellow"},
  {id = "⚠️", label = "issue", definition = "problems to fix", color = "red"},
  {id = "🙌", label = "praise", definition = "positive feedback", color = "green"}
]

[forge]
comment_type_prefix = true
